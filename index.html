<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .toolbar-sticky {
            position: sticky;
            top: 0;
            z-index: 1050;
            background-color: var(--bs-body-bg);
            border-bottom: 1px solid var(--bs-border-color);
            padding: 0.75rem 0;
        }

        .pane-toolbar {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--bs-border-color);
        }

        .pane-textarea {
            width: 100%;
            min-height: 300px;
            resize: vertical;
            background-color: var(--bs-secondary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-body-color);
            padding: 0.75rem;
            border-radius: 0.375rem;
        }

        .pane-textarea:focus {
            outline: none;
            border-color: var(--bs-primary);
            box-shadow: 0 0 0 0.25rem rgba(var(--bs-primary-rgb), 0.25);
        }

        .balance-display {
            font-family: monospace;
            font-size: 0.9rem;
        }

        .pane-content {
            padding: 1rem 0;
        }

        .api-key-wrapper {
            position: relative;
        }

        .api-key-wrapper .btn-toggle-visibility {
            position: absolute;
            right: 0.25rem;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.25rem 0.5rem;
            background: transparent;
            border: none;
            color: var(--bs-secondary-color);
            cursor: pointer;
        }

        .api-key-wrapper .btn-toggle-visibility:hover {
            color: var(--bs-body-color);
        }
    </style>
</head>
<body onLoad="main.init()">
    <div class="container-fluid">
        <div class="toolbar-sticky">
            <div class="row g-2 align-items-center">
                <div class="col-md-4">
                    <div class="api-key-wrapper">
                        <label for="api-key-input" class="visually-hidden">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="form-control" placeholder="OpenRouter API Key" aria-label="OpenRouter API Key">
                        <button type="button" class="btn-toggle-visibility" id="toggle-key-visibility" aria-label="Toggle API key visibility">👁</button>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-secondary w-100" id="config-button">
                        ⚙ Config
                    </button>
                </div>
                <div class="col-md-6 text-end">
                    <span class="balance-display" id="balance-display">Balance: --</span>
                </div>
            </div>
        </div>

        <!-- Error alert container -->
        <div id="error-container" class="container-fluid mt-2"></div>

        <!-- error-alert-template: Bootstrap alert for displaying errors -->
        <template id="error-alert-template">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <span class="error-message"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </template>

        <main>
            <div class="row g-3 p-3">
                <div class="col-md-6">
                    <div class="input-pane">
                        <div class="pane-toolbar">
                            <button type="button" class="btn btn-primary" id="input-translate-btn">
                                Translate
                            </button>
                        </div>
                        <div class="pane-content">
                            <textarea class="pane-textarea" id="input-textarea" placeholder="Enter text to translate..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="output-pane">
                        <div class="pane-toolbar">
                            <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" id="output-translate-btn">
                                        Translate
                                    </button>
                                </div>
                                <div class="col">
                                    <select class="form-select" id="prompt-dropdown" aria-label="Prompt selection">
                                        <option value="" selected>Select prompt...</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="pane-content">
                            <textarea class="pane-textarea" id="output-textarea" placeholder="Translation output..." readonly></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>

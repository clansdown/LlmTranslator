<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .toolbar-sticky {
            position: sticky;
            top: 0;
            z-index: 1050;
            background-color: var(--bs-body-bg);
            border-bottom: 1px solid var(--bs-border-color);
            padding: 0.75rem 0;
        }

        .pane-toolbar {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--bs-border-color);
        }

        .pane-textarea {
            width: 100%;
            min-height: 300px;
            resize: vertical;
            background-color: var(--bs-secondary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-body-color);
            padding: 0.75rem;
            border-radius: 0.375rem;
        }

        .pane-textarea:focus {
            outline: none;
            border-color: var(--bs-primary);
            box-shadow: 0 0 0 0.25rem rgba(var(--bs-primary-rgb), 0.25);
        }

        .balance-display {
            font-family: monospace;
            font-size: 0.9rem;
        }

        .pane-content {
            padding: 1rem 0;
        }

        .api-key-wrapper {
            position: relative;
        }

        .api-key-wrapper .btn-toggle-visibility {
            position: absolute;
            right: 0.25rem;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.25rem 0.5rem;
            background: transparent;
            border: none;
            color: var(--bs-secondary-color);
            cursor: pointer;
        }

        .api-key-wrapper .btn-toggle-visibility:hover {
            color: var(--bs-body-color);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="toolbar-sticky">
            <div class="row g-2 align-items-center">
                <div class="col-md-6">
                    <select class="form-select" id="model-selector" aria-label="Model selection" disabled>
                        <option value="">Select model...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <div class="api-key-wrapper">
                        <label for="api-key-input" class="visually-hidden">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="form-control" placeholder="OpenRouter API Key" aria-label="OpenRouter API Key">
                        <button type="button" class="btn-toggle-visibility" id="toggle-key-visibility" aria-label="Toggle API key visibility">👁</button>
                    </div>
                </div>
                <div class="col-md-1 text-end">
                    <button type="button" class="btn btn-outline-secondary" id="config-button">
                        ⚙ 
                    </button>
                </div>
                <div class="col-md-1 text-end">
                    <span class="balance-display" id="balance-display" title="OpenRouter balance">--</span>
                </div>
            </div>
        </div>

        <!-- Error alert container -->
        <div id="error-container" class="container-fluid mt-2"></div>

        <!-- error-alert-template: Bootstrap alert for displaying errors -->
        <template id="error-alert-template">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <span class="error-message"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </template>

        <main>
            <div class="row g-3 p-3">
                <div class="col-md-6">
                    <div class="input-pane">
                        <div class="pane-toolbar">
                            <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" id="input-translate-btn" disabled>
                                        Translate
                                    </button>
                                </div>
                                <div class="col">
                                    <select class="form-select" id="input-language-dropdown" aria-label="Target language">
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="pane-content">
                            <textarea class="pane-textarea" id="input-textarea" placeholder="Paste text to translate..."></textarea>
                            <div id="input-translations-container"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="output-pane">
                        <div class="pane-toolbar">
                            <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" id="output-translate-btn" disabled>
                                        Translate
                                    </button>
                                </div>
                                <div class="col">
                                    <select class="form-select" id="prompt-dropdown" aria-label="Prompt selection">
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="pane-content">
                            <textarea class="pane-textarea" id="output-textarea" placeholder="Type text to translate..."></textarea>
                            <div id="output-translations-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- translation-item-template: Template for displaying a translation pair -->
    <template id="translation-item-template">
        <div class="translation-item" style="border: 1px solid var(--bs-border-color); border-radius: 0.375rem; margin-bottom: 1rem; overflow: hidden;">
            <div style="background: var(--bs-tertiary-bg); padding: 0.5rem; font-size: 0.875rem; color: var(--bs-secondary-color);">
                <span class="translation-prompt"></span>
                <span style="float: right;" class="translation-model-name"></span>
            </div>
            <div class="row">
                <div class="col-12 text-justify translation-source" style="padding: 0.75rem; border-bottom: 1px solid var(--bs-border-color); white-space: pre-wrap; font-size: 0.9rem;"></div>
            </div>
            <div class="row">
                <div class="col-12 text-justify translation-target" style="padding: 0.75rem; white-space: pre-wrap; font-size: 0.9rem;"></div>
            </div>
            <div class="translation-spinner" style="display: none; padding: 1rem; text-align: center;">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                <span style="margin-left: 0.5rem;">Translating...</span>
            </div>
            <div class="translation-error" style="display: none; padding: 0.75rem; background: var(--bs-danger-bg-subtle); color: var(--bs-danger);">
                <div class="error-message"></div>
                <button type="button" class="btn btn-sm btn-outline-danger mt-2 retry-btn">Retry</button>
            </div>
        </div>
    </template>

    <!-- settings-modal-template: Large modal for application settings -->
    <template id="settings-modal-template">
        <div class="modal fade" tabindex="-1" aria-labelledby="settings-modal-title">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="settings-modal-title">Settings</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <h6>Model Price Filter ($ per million tokens)</h6>
                        <div class="row g-2 mb-4">
                            <div class="col">
                                <label for="settings-min-price" class="form-label">Min Price</label>
                                <input type="number" id="settings-min-price" class="form-control" min="0" step="0.01" placeholder="0.00">
                            </div>
                            <div class="col">
                                <label for="settings-max-price" class="form-label">Max Price</label>
                                <input type="number" id="settings-max-price" class="form-control" min="0" step="0.01" placeholder="No limit">
                            </div>
                        </div>
                        <hr>
                        <h6>Prompts</h6>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <select id="settings-prompt-list" class="form-select" size="8">
                                </select>
                                <div class="mt-2">
                                    <button type="button" class="btn btn-sm btn-outline-primary" id="settings-add-prompt-btn">Add</button>
                                    <button type="button" class="btn btn-sm btn-outline-danger ms-1" id="settings-delete-prompt-btn">Delete</button>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="mb-2">
                                    <input type="text" id="settings-prompt-name" class="form-control" placeholder="Prompt name">
                                </div>
                                <textarea id="settings-prompt-content" class="form-control" rows="6" placeholder="Enter prompt text..."></textarea>
                                <button type="button" class="btn btn-sm btn-primary mt-2" id="settings-save-prompt-btn">Save Prompt</button>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="settings-save-btn">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>

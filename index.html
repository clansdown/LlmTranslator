<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Translator</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#212529">
    <link rel="icon" type="image/png" sizes="32x32" href="/llm_translate-32x32.png">
    <link rel="apple-touch-icon" href="/llm_translate-180x180.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .toolbar-sticky {
            position: sticky;
            top: 0;
            z-index: 1050;
            background-color: var(--bs-body-bg);
            border-bottom: 1px solid var(--bs-border-color);
            padding: 0.75rem 0;
        }

        .pane-toolbar {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--bs-border-color);
        }

        .pane-textarea {
            width: 100%;
            min-height: 300px;
            resize: vertical;
            background-color: var(--bs-secondary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-body-color);
            padding: 0.75rem;
            border-radius: 0.375rem;
        }

        .pane-textarea:focus {
            outline: none;
            border-color: var(--bs-primary);
            box-shadow: 0 0 0 0.25rem rgba(var(--bs-primary-rgb), 0.25);
        }

        .balance-display {
            font-family: monospace;
            font-size: 0.9rem;
        }

        .pane-content {
            padding: 1rem 0;
        }

        .text-justify {
            /* text-align: justify; */
        }

        .translation-target,
        .translation-explanation,
        .translation-nuances {
            font-size: 0.9rem;
        }

        .translation-target p,
        .translation-explanation p,
        .translation-nuances p {
            margin-bottom: 0.5rem;
        }

        .translation-target p:last-child,
        .translation-explanation p:last-child,
        .translation-nuances p:last-child {
            margin-bottom: 0;
        }

        .translation-target code,
        .translation-explanation code,
        .translation-nuances code {
            background: var(--bs-tertiary-bg);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            font-size: 0.85em;
        }

        .translation-target pre,
        .translation-explanation pre,
        .translation-nuances pre {
            background: var(--bs-tertiary-bg);
            padding: 0.5rem;
            border-radius: 0.375rem;
            overflow-x: auto;
        }

        .translation-target pre code,
        .translation-explanation pre code,
        .translation-nuances pre code {
            background: none;
            padding: 0;
        }

        .translation-target ul,
        .translation-explanation ul,
        .translation-nuances ul,
        .translation-target ol,
        .translation-explanation ol,
        .translation-nuances ol {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
        }

        .translation-target blockquote,
        .translation-explanation blockquote,
        .translation-nuances blockquote {
            border-left: 3px solid var(--bs-border-color);
            padding-left: 0.75rem;
            margin-left: 0;
            color: var(--bs-secondary-color);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="toolbar-sticky">
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <button type="button" class="btn btn-outline-primary btn-sm" id="new-session-btn" aria-label="New conversation" title="Start a new conversation">+</button>
                </div>
                <div class="col">
                    <select class="form-select form-select-sm" id="session-selector" aria-label="Conversation selection">
                    </select>
                </div>
                <div class="col-md-auto text-end">
                    <button type="button" class="btn btn-outline-secondary" id="config-button" title="Open configuration settings">
                        ⚙ 
                    </button>
                </div>
                <div class="col-md-auto text-end">
                    <span class="balance-display" id="balance-display" title="OpenRouter balance">--</span>
                </div>
            </div>
        </div>

        <!-- Error alert container -->
        <div id="error-container" class="container-fluid mt-2"></div>

        <!-- error-alert-template: Bootstrap alert for displaying errors -->
        <template id="error-alert-template">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <span class="error-message"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </template>

        <main>
            <div class="row g-3 p-3">
                <div class="col-md-6">
                    <div class="input-pane">
                        <div class="pane-toolbar">
                            <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" id="input-translate-btn" disabled>
                                        Translate
                                    </button>
                                </div>
                                <div class="col">
                                    <select class="form-select" id="input-language-dropdown" aria-label="Target language">
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="pane-content">
                            <textarea class="pane-textarea" id="input-textarea" placeholder="Paste text to translate..."></textarea>
                            <div id="input-translations-container"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="output-pane">
                        <div class="pane-toolbar">
                            <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" id="output-translate-btn" disabled>
                                        Translate
                                    </button>
                                </div>
                                <div class="col">
                                    <select class="form-select" id="prompt-dropdown" aria-label="Prompt selection">
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="pane-content">
                            <textarea class="pane-textarea" id="output-textarea" placeholder="Type text to translate..."></textarea>
                            <div id="output-translations-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- translation-item-template: Template for displaying a translation pair -->
    <template id="translation-item-template">
        <div class="translation-item" style="border: 1px solid var(--bs-border-color); border-radius: 0.375rem; margin-bottom: 1rem; overflow: hidden;">
            <div class="row p-2 small" style="background: var(--bs-tertiary-bg); color: var(--bs-secondary-color);">
                <div class="col-lg-2">
                    <span class="translation-prompt"></span>
                </div>
                <div class="col-lg-1">
                    <span class="translation-char-count"></span>
                </div>
                <div class="col text-end">
                    <span class="ms-2 translation-model-name"></span>
                </div>
            </div>
            <div class="row px-3">
                <div class="col text-justify translation-source p-2" style="border-bottom: 1px solid var(--bs-border-color); white-space: pre-wrap;"></div>
                <div class="col-auto p-1">
                    <button type="button" class="btn btn-sm btn-outline-secondary copy-source-btn" title="Copy to clipboard">📋</button>
                </div>
            </div>
            <div class="row px-3">
                <div class="col text-justify translation-target p-2" style="white-space: pre-wrap;"></div>
                <div class="col-auto p-1">
                    <button type="button" class="btn btn-sm btn-outline-secondary copy-target-btn" title="Copy to clipboard">📋</button>
                </div>
            </div>
            <div class="translation-sections px-3 pb-2">
                <div class="translation-explanation-content mt-2">
                    <button type="button" class="btn btn-sm btn-link p-0 text-decoration-none toggle-section-btn" data-target="translation-explanation">▼</button>
                    <span class="ms-1 fw-semibold">Explanation</span>
                    <div class="translation-explanation small text-justify mt-1 ps-4" style="display: none; white-space: pre-wrap;"></div>
                </div>
                <div class="translation-nuances-content mt-2">
                    <button type="button" class="btn btn-sm btn-link p-0 text-decoration-none toggle-section-btn" data-target="translation-nuances">▼</button>
                    <span class="ms-1 fw-semibold">Nuances</span>
                    <div class="translation-nuances small text-justify mt-1 ps-4" style="display: none; white-space: pre-wrap;"></div>
                </div>
            </div>
            <div class="translation-spinner" style="display: none; padding: 1rem; text-align: center;">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                <span style="margin-left: 0.5rem;">Translating...</span>
            </div>
            <div class="translation-error" style="display: none; padding: 0.75rem; background: var(--bs-danger-bg-subtle); color: var(--bs-danger);">
                <div class="error-message"></div>
                <button type="button" class="btn btn-sm btn-outline-danger mt-2 retry-btn">Retry</button>
            </div>
        </div>
    </template>

    <!-- settings-modal-template: Large modal for application settings -->
    <template id="settings-modal-template">
        <div class="modal fade" tabindex="-1" aria-labelledby="settings-modal-title">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="settings-modal-title">Settings</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <ul class="nav nav-tabs mb-3" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button type="button" class="nav-link active" id="settings-tab-btn" data-bs-toggle="tab" data-bs-target="#settings-content" role="tab" aria-controls="settings-content" aria-selected="true">Settings</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button type="button" class="nav-link" id="conversations-tab-btn" data-bs-toggle="tab" data-bs-target="#conversations-content" role="tab" aria-controls="conversations-content" aria-selected="false">Conversations</button>
                            </li>
                        </ul>
                        <div class="tab-content" id="settings-tab-content">
                            <div class="tab-pane fade show active" id="settings-content" role="tabpanel" aria-labelledby="settings-tab-btn">
                                <h6>OpenRouter API Key</h6>
                                <div class="mb-3">
                                    <div class="input-group">
                                        <input type="password" id="settings-api-key" class="form-control" 
                                               placeholder="Enter your OpenRouter API key"
                                               title="Your OpenRouter API key for accessing translation models">
                                        <button type="button" class="btn btn-outline-secondary" 
                                                id="settings-toggle-key-visibility" 
                                                title="Show or hide the API key"
                                                aria-label="Toggle API key visibility">👁</button>
                                    </div>
                                </div>
                                <hr>
                                <h6>Model Price Filter ($ per million tokens)</h6>
                                <div class="row g-2 mb-4">
                                    <div class="col">
                                        <label for="settings-min-price" class="form-label">Min Price</label>
                                        <input type="number" id="settings-min-price" class="form-control" min="0" step="0.01" placeholder="0.00">
                                    </div>
                                    <div class="col">
                                        <label for="settings-max-price" class="form-label">Max Price</label>
                                        <input type="number" id="settings-max-price" class="form-control" min="0" step="0.01" placeholder="No limit">
                                    </div>
                                </div>
                                <hr>
                                <h6>Prompts</h6>
                                <div class="row mt-3">
                                    <div class="col-md-4">
                                        <select id="settings-prompt-list" class="form-select" size="8">
                                        </select>
                                        <div class="mt-2">
                                            <button type="button" class="btn btn-sm btn-outline-primary" id="settings-add-prompt-btn">Add</button>
                                            <button type="button" class="btn btn-sm btn-outline-danger ms-1" id="settings-delete-prompt-btn">Delete</button>
                                        </div>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="mb-2">
                                            <input type="text" id="settings-prompt-name" class="form-control" placeholder="Prompt name">
                                        </div>
                                        <textarea id="settings-prompt-content" class="form-control" rows="6" placeholder="Enter prompt text..."></textarea>
                                        <button type="button" class="btn btn-sm btn-primary mt-2" id="settings-save-prompt-btn">Save Prompt</button>
                                    </div>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="conversations-content" role="tabpanel" aria-labelledby="conversations-tab-btn">
                                <h6>Conversations</h6>
                                <div class="row g-2 mt-3">
                                    <div class="col-12">
                                        <label for="settings-session-list" class="form-label">Conversation</label>
                                        <div class="row g-2">
                                            <div class="col">
                                                <select id="settings-session-list" class="form-select">
                                                </select>
                                            </div>
                                            <div class="col-auto">
                                                <button type="button" class="btn btn-outline-danger" id="settings-delete-session-btn" disabled title="Delete this conversation">Delete</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <label for="settings-session-name" class="form-label">Name</label>
                                        <input type="text" id="settings-session-name" class="form-control" placeholder="Enter conversation name">
                                    </div>
                                    <div class="col-12">
                                        <label for="settings-session-model" class="form-label">LLM Model</label>
                                        <select id="settings-session-model" class="form-select">
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label for="settings-session-reasoning" class="form-label">Reasoning Level</label>
                                        <select id="settings-session-reasoning" class="form-select"
                                                title="Controls how much reasoning the model does before responding">
                                            <option value="none">None</option>
                                            <option value="minimal">Minimal</option>
                                            <option value="low">Low</option>
                                            <option value="medium">Medium</option>
                                            <option value="high">High</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label for="settings-session-background" class="form-label">Background</label>
                                        <textarea id="settings-session-background" class="form-control" rows="4" placeholder="Context for the AI about who you're talking to, what the conversation is about, etc."></textarea>
                                    </div>
                                    <div class="col-12">
                                        <button type="button" class="btn btn-sm btn-primary" id="settings-save-session-btn">Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="settings-save-btn">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
